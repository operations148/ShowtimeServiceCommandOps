name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# Least-privilege default (Phase 1: "least-privilege GitHub Actions
# permissions") -- no job needs more than reading the repo checkout.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Migration-modification check needs history to diff against the
          # base branch, and needs the base branch fetched explicitly since
          # a default checkout is shallow and single-branch.
          fetch-depth: 0

      - name: Fetch base branch for migration diff
        if: github.event_name == 'pull_request'
        run: git fetch origin ${{ github.base_ref }} --depth=1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies (locked)
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit/integration tests
        run: npm run test

      - name: Migration additive-only check
        if: github.event_name == 'pull_request'
        run: bash scripts/check-migrations.sh origin/${{ github.base_ref }}

      - name: Build
        run: npm run build
        env:
          # Dummy values so the build's env-presence check and static
          # generation succeed in CI without real secrets. No live service
          # is ever called during `next build`.
          NEXTAUTH_SECRET: ci-placeholder-secret-not-real
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_SUPABASE_URL: https://ci-placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role-key
          GHL_WEBHOOK_SECRET: ci-placeholder-webhook-secret
          GHL_PRIVATE_INTEGRATION_TOKEN: ci-placeholder-token
          GHL_LOCATION_ID: ci-placeholder-location
          CRON_SECRET: ci-placeholder-cron-secret

      - name: Dependency audit
        run: npm audit --audit-level=critical
        continue-on-error: true # advisory only -- see docs/audits/dependency-audit.md for the accepted-risk list

      - name: Lightweight secret-pattern scan
        run: |
          # Not a substitute for a dedicated tool (gitleaks/trufflehog) --
          # this is a fast, free, good-faith check for obviously-shaped secrets.
          #
          # Phase 11 fix: the previous version diffed against origin/master,
          # which is EMPTY on a push to master (HEAD == origin/master), and
          # `if <empty xargs, exit 0>` then took the failure branch -- every
          # master push failed with a false "secret found". Scanning all
          # tracked files instead is immune to event type / shallow checkouts,
          # and strictly more protective (catches pre-existing secrets too).
          MATCHES=$(git ls-files -z \
            | xargs -0 -r grep -nE "(AKIA[0-9A-Z]{16}|-----BEGIN [A-Z ]*PRIVATE KEY-----|sk_live_[0-9a-zA-Z]{20,}|sb_secret_[A-Za-z0-9_]{10,}|whsec_[A-Za-z0-9]{20,})" -- 2>/dev/null || true)
          if [ -n "$MATCHES" ]; then
            echo "$MATCHES"
            echo "Potential secret pattern found -- review before merging."
            exit 1
          fi
          echo "No obvious secret patterns found."
